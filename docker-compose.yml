# UltraMem quickstart: the API server + Qdrant. Provider keys come from .env
# (copy .env.example → .env first).
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Phase A source of truth. Present so the infra is ready; the engine only uses
  # it when ULTRAMEM_PG_URL is set (scaffold — no dual-write yet).
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ultramem
      POSTGRES_PASSWORD: ultramem
      POSTGRES_DB: ultramem
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ultramem:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
      - postgres
    ports:
      - "8080:8080"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      JINA_API_KEY: ${JINA_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Swappable embedder (Phase 3): "jina" (default) or "openai" + OPENAI_API_KEY.
      ULTRAMEM_EMBEDDER: ${ULTRAMEM_EMBEDDER:-jina}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ULTRAMEM_API_KEY: ${ULTRAMEM_API_KEY}
      # Phase A: unset by default (engine unchanged). Uncomment to enable the SoT.
      ULTRAMEM_PG_URL: ${ULTRAMEM_PG_URL:-}
      PORT: "8080"

volumes:
  qdrant_data:
  pg_data:
