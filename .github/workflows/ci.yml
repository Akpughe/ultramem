name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Unit tests across all targets (lib, bins, and the eval-harness examples,
      # so the harness's own parser/metric tests gate too) plus doc tests. The
      # live pipeline tests are gated behind ULTRAMEM_PIPELINE_TESTS=1 and require
      # Qdrant + provider keys, so they are intentionally NOT run here — CI stays
      # hermetic.
      - name: Test (all targets)
        run: cargo test --workspace --all-targets
      - name: Doc tests
        run: cargo test --workspace --doc
